<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DASPOWEAR — Лукбук</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,200;0,9..144,300;0,9..144,400;1,9..144,200;1,9..144,300&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/css/global.css" />

  <style>
    .lb-page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 3rem var(--pad) 4rem;
    }
    .lb-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 3rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .lb-top h1 {
      font-family: var(--font-display);
      font-weight: 200;
      font-size: clamp(2.4rem, 5vw, 4.4rem);
      letter-spacing: -0.03em;
      line-height: 1;
    }
    .lb-top h1 em { font-style: italic; font-weight: 300; }
    .lb-top .meta {
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      max-width: 32ch;
      line-height: 1.6;
    }
    .back {
      display: inline-block;
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2rem;
    }
    .back:hover { color: var(--ink); }
    .lb-stack {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    .lb-frame {
      position: relative;
      overflow: hidden;
      background: var(--bg-soft);
    }
    .lb-frame img {
      width: 100%;
      height: auto;
      display: block;
    }
    .lb-frame figcaption {
      position: absolute;
      bottom: 1.2rem;
      left: 1.2rem;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.65);
      background: rgba(255,255,255,0.85);
      padding: 0.4rem 0.7rem;
    }
    .lb-pairs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }
    @media (max-width: 700px) {
      .lb-pairs { grid-template-columns: 1fr; }
    }
    .lb-end {
      margin-top: 4rem;
      text-align: center;
      padding: 3rem var(--pad);
      border-top: 1px solid var(--line);
    }
    .lb-end .eyebrow {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.4rem;
    }
    .lb-end h2 {
      font-family: var(--font-display);
      font-weight: 300;
      font-style: italic;
      font-size: clamp(1.4rem, 3vw, 2.4rem);
      letter-spacing: -0.02em;
      margin-bottom: 2rem;
    }
  </style>
</head>
<body>
  <div id="nav-mount"></div>

  <main class="page">
    <div class="lb-page">
      <a href="/index.html" class="back">← Назад в магазин</a>

      <div class="lb-top">
        <h1>Лукбук<br><em>N°01</em></h1>
        <div class="meta">
          Шесть кадров · Одна вещь<br>
          Этюд о поверхности и силуэте.
        </div>
      </div>

      <div class="lb-stack">
        <figure class="lb-frame">
          <img src="/images/skirt-03-pose.jpg" alt="01 / Кадр" />
          <figcaption>01 / Поза</figcaption>
        </figure>

        <div class="lb-pairs">
          <figure class="lb-frame">
            <img src="/images/skirt-02-side.jpg" alt="02" />
            <figcaption>02 / Движение</figcaption>
          </figure>
          <figure class="lb-frame">
            <img src="/images/skirt-04-back.jpg" alt="03" />
            <figcaption>03 / Спина</figcaption>
          </figure>
        </div>

        <figure class="lb-frame">
          <img src="/images/skirt-06-floor.jpg" alt="04" />
          <figcaption>04 / Покой</figcaption>
        </figure>

        <div class="lb-pairs">
          <figure class="lb-frame">
            <img src="/images/skirt-01-hanger.jpg" alt="05" />
            <figcaption>05 / Объект</figcaption>
          </figure>
          <figure class="lb-frame">
            <img src="/images/skirt-05-detail.jpg" alt="06" />
            <figcaption>06 / Фактура</figcaption>
          </figure>
        </div>
      </div>

      <div class="lb-end">
        <div class="eyebrow">Конец лукбука</div>
        <h2>Готовы примерить вещь?</h2>
        <a href="/product.html?id=1" class="btn">К товару</a>
      </div>
    </div>
  </main>

  <div id="footer-mount"></div>

  <script src="/js/api.js"></script>
  <script src="/js/shell.js"></script>
</body>
</html>
